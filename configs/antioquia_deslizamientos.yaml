# =============================================================================
# Configuración de alcance — Antioquia Deslizamientos
# Experimento: clasificación binaria de ocurrencia de deslizamiento
#
# Cambio v2.0.0: de multiclase (bajo/medio/alto) a binario (ocurre / no ocurre)
# Este archivo es la única fuente de verdad para parámetros de negocio.
# Todo cambio aquí se versiona en Git y se registra en MLflow automáticamente.
# =============================================================================

# ---------------------------------------------------------------------------
# Alcance geográfico
# ---------------------------------------------------------------------------
geo:
  departamento: "antioquia"          # normalizado: minúsculas sin tildes

# ---------------------------------------------------------------------------
# Alcance temporal
# ---------------------------------------------------------------------------
periodo:
  anio_inicio: 2019
  anio_fin: 2022

# ---------------------------------------------------------------------------
# Fuentes de datos (IDs Socrata en datos.gov.co)
# ---------------------------------------------------------------------------
fuentes:
  ideam:
    dataset_id: "s54a-sgyg"
    descripcion: "Precipitación IDEAM — sensores automáticos (mm)"
    limit_por_mes: 5000

  ungrd:
    dataset_id: "wwkg-r6te"
    descripcion: "Emergencias UNGRD 2019-2022"
    max_records: 30000

  siata:
    csv_path: "data/raw/siata_precipitacion.csv"
    activo: false
    descripcion: "Estaciones pluviométricas SIATA — Valle de Aburrá y Antioquia"

# ---------------------------------------------------------------------------
# Filtros de eventos (UNGRD)
# Taxonomía conforme a Ley 1523 de 2012 (Gestión del Riesgo, Colombia)
# ---------------------------------------------------------------------------
eventos:
  hidro_keywords:
    - "avenida torrencial"
    - "creciente subita"
    - "inundacion"
    - "deslizamiento"
    - "derrumbe"
    - "movimiento en masa"
    - "flujo de lodo"

  landslide_keywords:
    - "deslizamiento"
    - "derrumbe"
    - "movimiento en masa"
    - "flujo de lodo"
    - "flujo de detritos"
    - "caida de roca"
    - "reptacion"

# ---------------------------------------------------------------------------
# Target binario
# 0 = no ocurre ningún deslizamiento en el mes
# 1 = ocurre al menos un deslizamiento en el mes
#
# Ventaja sobre multiclase: no requiere umbrales arbitrarios.
# Métrica principal: AUC-ROC + Recall de clase positiva (costo asimétrico:
# es peor no detectar un deslizamiento real que generar una falsa alarma).
# ---------------------------------------------------------------------------
target:
  nombre: "deslizamiento"
  tipo: "binario"
  clase_positiva: 1
  clase_positiva_desc: "Ocurre al menos un deslizamiento en el mes"
  clase_negativa: 0
  clase_negativa_desc: "No ocurre ningún deslizamiento en el mes"
  # Peso de clase para manejar desbalance en el modelo
  # "balanced" = sklearn calcula los pesos automáticamente
  class_weight: "balanced"

# ---------------------------------------------------------------------------
# Feature engineering
# ---------------------------------------------------------------------------
features:
  base:
    - "precip_suma"
    - "precip_max"
    - "precip_media"
    - "precip_dias"
    - "n_estaciones"

  lagged:
    - "precip_lag1"
    - "precip_acum3m"
    - "precip_acum6m"
    - "precip_max3m"
    - "precip_dias3m"

  seasonality:
    - "mes_sin"
    - "mes_cos"

  siata:
    - "siata_precip_suma"
    - "siata_precip_max"

  required_for_model:
    - "precip_lag1"
    - "precip_acum3m"

# ---------------------------------------------------------------------------
# Calidad de datos
# ---------------------------------------------------------------------------
calidad:
  cobertura_sensor_percentil: 25
  precip_min_mm: 0
  precip_max_mm: 500

# ---------------------------------------------------------------------------
# MLflow
# ---------------------------------------------------------------------------
mlflow:
  experiment_name: "antioquia_deslizamientos_binario"
  db_path: "mlruns/mlflow.db"
  run_tags:
    proyecto: "blindaje_territorio"
    equipo: "grupo_mlops"
    version_config: "2.0.0"
    tipo_problema: "clasificacion_binaria"
