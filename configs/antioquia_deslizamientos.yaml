# =============================================================================
# Configuración de alcance — Antioquia Deslizamientos
# Experimento: clasificación binaria de ocurrencia de deslizamiento
#
# Cambio v2.0.0: de multiclase (bajo/medio/alto) a binario (ocurre / no ocurre)
# Este archivo es la única fuente de verdad para parámetros de negocio.
# Todo cambio aquí se versiona en Git y se registra en MLflow automáticamente.
# =============================================================================

# ---------------------------------------------------------------------------
# Alcance geográfico
# ---------------------------------------------------------------------------
geo:
  departamento: "antioquia"          # normalizado: minúsculas sin tildes

# ---------------------------------------------------------------------------
# Alcance temporal
# ---------------------------------------------------------------------------
periodo:
  anio_inicio: 2019
  anio_fin: 2022

# ---------------------------------------------------------------------------
# Fuentes de datos
# ---------------------------------------------------------------------------
fuentes:
  ideam:
    dataset_id: "s54a-sgyg"
    descripcion: "Precipitación IDEAM — sensores automáticos (mm) [legacy: 3.4% cobertura]"
    limit_por_mes: 5000

  ungrd:
    dataset_id: "wwkg-r6te"
    descripcion: "Emergencias UNGRD 2019-2022"
    max_records: 30000

  siata:
    csv_path: "data/raw/siata_precipitacion.csv"
    activo: false
    descripcion: "Estaciones pluviométricas SIATA — Valle de Aburrá y Antioquia"

  chirps:
    activo: true
    descripcion: "CHIRPS v2.0 — precipitación diaria 5.5 km (CHC/UCSB). Sin registro."
    base_url: "https://data.chc.ucsb.edu/products/CHIRPS-2.0/global_daily/tifs/p05"
    bbox:
      lat_min: 5.0
      lat_max: 8.9
      lon_min: -77.1
      lon_max: -73.9

  era5:
    activo: true
    descripcion: "ERA5-Land — humedad suelo 9 km (ECMWF/Copernicus). Requiere ~/.cdsapirc."
    variables:
      - "volumetric_soil_water_layer_2"
    bbox:
      north: 8.9
      west: -77.1
      south: 5.0
      east: -73.9

# ---------------------------------------------------------------------------
# Filtros de eventos (UNGRD)
# Taxonomía conforme a Ley 1523 de 2012 (Gestión del Riesgo, Colombia)
# ---------------------------------------------------------------------------
eventos:
  hidro_keywords:
    - "avenida torrencial"
    - "creciente subita"
    - "inundacion"
    - "deslizamiento"
    - "derrumbe"
    - "movimiento en masa"
    - "flujo de lodo"

  landslide_keywords:
    - "deslizamiento"
    - "derrumbe"
    - "movimiento en masa"
    - "flujo de lodo"
    - "flujo de detritos"
    - "caida de roca"
    - "reptacion"

# ---------------------------------------------------------------------------
# Target binario
# 0 = no ocurre ningún deslizamiento en los próximos 7 días
# 1 = ocurre al menos un deslizamiento en los próximos 7 días

# ---------------------------------------------------------------------------
target:
  nombre: "deslizamiento"
  tipo: "binario"
  clase_positiva: 1
  clase_positiva_desc: "Ocurre al menos un deslizamiento en los próximos 7 días"
  clase_negativa: 0
  clase_negativa_desc: "No ocurre ningún deslizamiento en los próximos 7 días"
  class_weight: "balanced"

# ---------------------------------------------------------------------------
# Configuración espacial (Fase 2)
# ---------------------------------------------------------------------------
espacial:
  granularidad: "cuenca"       # "departamento" (v1/v2) | "cuenca" (v3)
  hydrobasins_nivel: 10        # nivel HydroSHEDS — nivel 10 ≈ 100-500 km² por cuenca (~300 en Antioquia)
  pseudo_absence:
    precip_percentil: 0.25     # semanas con precip ≤ P25 → negativos defensibles
    area_percentil: 0.25       # cuencas con UP_AREA ≤ P25 → "headwaters estables"

# ---------------------------------------------------------------------------
ventanas:
  precipitacion_dias: 14    # días hacia atrás para acumular precipitación
  prediccion_dias: 7        # días hacia adelante que predice el target
  granularidad: "semanal"   # unidad de análisis
  
# ---------------------------------------------------------------------------
# Feature engineering
# ---------------------------------------------------------------------------
features:
  base:
    - "precip_acum_14d"        # acumulado 14 días — fuente: CHIRPS (v2) o IDEAM (legacy)
    - "precip_max_diario_14d"  # máximo diario en 14 días — captura intensidad
    - "precip_dias_lluvia_14d" # días con lluvia > 0 en la ventana
    - "precip_acum_7d"         # acumulado últimos 7 días
    - "precip_acum_3d"         # acumulado últimos 3 días — señal inmediata

  era5:
    - "soil_moisture_14d"      # humedad suelo media 14 días (m³/m³) — ERA5-Land swvl2

  seasonality:
    - "semana_sin"
    - "semana_cos"
    - "mes_sin"               # captura bimodalidad lluvias Colombia
    - "mes_cos"

  siata:
    - "siata_precip_acum_14d"
    - "siata_precip_max_14d"

  required_for_model:
    - "precip_acum_14d"
    - "precip_acum_7d"
    - "soil_moisture_14d"

# ---------------------------------------------------------------------------
# Calidad de datos
# ---------------------------------------------------------------------------
calidad:
  cobertura_sensor_percentil: 25
  precip_min_mm: 0
  precip_max_mm: 500

# ---------------------------------------------------------------------------
# Datos
# ---------------------------------------------------------------------------
datos:
  dataset_procesado: "antioquia_deslizamientos_semanal_v2.csv"
# ---------------------------------------------------------------------------
# MLflow
# ---------------------------------------------------------------------------
mlflow:
  experiment_name: "antioquia_deslizamientos_semanal"
  db_path: "mlruns/mlflow.db"
  run_tags:
    dataset_procesado: "antioquia_deslizamientos_semanal_v2.csv"
    proyecto: "blindaje_territorio"
    equipo: "grupo_mlops"
    version_config: "3.0.0"
    tipo_problema: "clasificacion_binaria"
    fuente_precip: "chirps_v2"
    fuente_humedad: "era5land_swvl2"
